<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor w/ LLM Feedback</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="toolbar-left">
          <button id="select-directory-button">Select Folder</button>
          <div class="directory-input">
            <input
              id="active-directory"
              class="active-directory"
              type="text"
              placeholder="Type a folder path"
            />
            <div id="directory-error" class="directory-error"></div>
          </div>
        </div>
        <div class="toolbar-right">
          <span id="active-file" class="active-file">No file selected</span>
          <button id="analyze-button" class="action-button">Analyze</button>
          <span id="status" class="status"></span>
        </div>
      </header>
      <div class="content">
        <aside class="files-panel">
          <div class="files-header">
            <span>Files</span>
            <div class="files-actions">
              <button id="new-folder-button" class="new-folder-button" type="button" aria-label="New folder">📁</button>
              <button id="new-file-button" class="new-file-button" type="button">+</button>
            </div>
          </div>
          <div id="files-list" class="files-list"></div>
        </aside>
        <div id="editor" class="editor"></div>
        <aside id="issues-panel" class="issues-panel">
          <div class="issues-header">Issues</div>
          <div id="issues-list" class="issues-list"></div>
        </aside>
      </div>
      <footer class="legend">
        <div class="legend-items">
          <span class="legend-item"><span class="legend-swatch spell"></span>Spell</span>
          <span class="legend-item"><span class="legend-swatch grammar"></span>Grammar</span>
          <span class="legend-item"><span class="legend-swatch llm"></span>LLM</span>
        </div>
        <button id="repo-status" class="repo-status hidden" type="button">
          <span id="repo-status-dot" class="repo-status-dot"></span>
          <span id="repo-status-label" class="repo-status-label">Repo</span>
        </button>
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
