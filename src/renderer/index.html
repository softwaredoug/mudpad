<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor w/ LLM Feedback</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="toolbar-left">
          <button id="select-directory-button">Select Folder</button>
          <div class="directory-input">
            <input
              id="active-directory"
              class="active-directory"
              type="text"
              placeholder="Type a folder path"
            />
            <div id="directory-error" class="directory-error"></div>
          </div>
        </div>
        <div class="toolbar-right">
          <span id="active-file" class="active-file">No file selected</span>
          <button id="analyze-button" class="action-button">Analyze</button>
          <span id="status" class="status"></span>
        </div>
      </header>
      <div class="content">
        <aside class="files-panel">
          <div class="files-header">
            <span>Files</span>
            <div class="files-actions">
              <button id="new-folder-button" class="new-folder-button" type="button" aria-label="New folder">📁</button>
              <button id="new-file-button" class="new-file-button" type="button">+</button>
            </div>
          </div>
          <div id="files-list" class="files-list"></div>
        </aside>
        <div id="editor" class="editor"></div>
        <aside id="issues-panel" class="issues-panel">
          <div class="issues-header">Issues</div>
          <div id="issues-list" class="issues-list"></div>
        </aside>
      </div>
      <footer class="legend">
        <div class="legend-items">
          <span class="legend-item"><span class="legend-swatch spell"></span>Spell</span>
          <span class="legend-item"><span class="legend-swatch grammar"></span>Grammar</span>
          <span class="legend-item"><span class="legend-swatch llm"></span>LLM</span>
        </div>
        <button id="repo-status" class="repo-status hidden" type="button">
          <span id="repo-status-dot" class="repo-status-dot"></span>
          <span id="repo-status-label" class="repo-status-label">Repo</span>
        </button>
      </footer>
    </div>
    <div id="commit-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="commit-title">
        <div class="modal-header">
          <h2 id="commit-title">Commit changes</h2>
        </div>
        <div class="modal-body">
          <label class="modal-label" for="commit-summary">Summary</label>
          <input id="commit-summary" class="modal-input" type="text" placeholder="Short commit summary" />
          <label class="modal-label" for="commit-details">Details (optional)</label>
          <textarea id="commit-details" class="modal-textarea" rows="4" placeholder="More detail about this change"></textarea>
          <div id="commit-error" class="modal-error"></div>
        </div>
        <div class="modal-actions">
          <button id="commit-cancel" class="button-secondary" type="button">Cancel</button>
          <button id="commit-confirm" class="button-primary" type="button">Commit</button>
        </div>
      </div>
    </div>
    <div id="repo-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="repo-title">
        <div class="modal-header">
          <h2 id="repo-title">Repository status</h2>
        </div>
        <div class="modal-body">
          <div id="repo-status-summary" class="repo-status-summary"></div>
          <div id="repo-status-details" class="repo-status-details"></div>
          <div id="repo-status-error" class="modal-error"></div>
        </div>
        <div class="modal-actions">
          <button id="repo-close" class="button-secondary" type="button">Close</button>
          <button id="repo-sync" class="button-primary" type="button">Sync with origin</button>
        </div>
      </div>
    </div>
    <div id="rename-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="rename-title">
        <div class="modal-header">
          <h2 id="rename-title">Rename file</h2>
        </div>
        <div class="modal-body">
          <label class="modal-label" for="rename-input">New filename</label>
          <input id="rename-input" class="modal-input" type="text" placeholder="new-file-name.md" />
          <div id="rename-git-fields" class="rename-git-fields hidden">
            <label class="modal-label" for="rename-summary">Commit summary</label>
            <input id="rename-summary" class="modal-input" type="text" placeholder="Rename post file" />
            <label class="modal-label" for="rename-details">Commit details (optional)</label>
            <textarea id="rename-details" class="modal-textarea" rows="3" placeholder="Why this rename was needed"></textarea>
          </div>
          <div id="rename-error" class="modal-error"></div>
        </div>
        <div class="modal-actions">
          <button id="rename-cancel" class="button-secondary" type="button">Cancel</button>
          <button id="rename-delete" class="button-danger" type="button">Delete</button>
          <button id="rename-confirm" class="button-primary" type="button">Rename</button>
        </div>
      </div>
    </div>
    <div id="delete-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="delete-title">
        <div class="modal-header">
          <h2 id="delete-title">Delete file</h2>
        </div>
        <div class="modal-body">
          <div id="delete-file-name" class="repo-status-summary"></div>
          <div id="delete-git-fields" class="rename-git-fields hidden">
            <label class="modal-label" for="delete-summary">Commit summary</label>
            <input id="delete-summary" class="modal-input" type="text" placeholder="Deleted file" />
            <label class="modal-label" for="delete-details">Commit details (optional)</label>
            <textarea id="delete-details" class="modal-textarea" rows="3" placeholder="Why this delete was needed"></textarea>
          </div>
          <div id="delete-error" class="modal-error"></div>
        </div>
        <div class="modal-actions">
          <button id="delete-cancel" class="button-secondary" type="button">Cancel</button>
          <button id="delete-confirm" class="button-primary" type="button">Confirm</button>
        </div>
      </div>
    </div>
    <div id="new-folder-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="new-folder-title">
        <div class="modal-header">
          <h2 id="new-folder-title">New folder</h2>
        </div>
        <div class="modal-body">
          <label class="modal-label" for="new-folder-name">Folder name</label>
          <input id="new-folder-name" class="modal-input" type="text" placeholder="folder-name" />
          <div id="new-folder-error" class="modal-error"></div>
        </div>
        <div class="modal-actions">
          <button id="new-folder-cancel" class="button-secondary" type="button">Cancel</button>
          <button id="new-folder-confirm" class="button-primary" type="button">Create</button>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
