<div class="component root issue-item">
  <div class="issue-type"></div>
  <div class="issue-message"></div>
  <div class="issue-source"></div>
  <div class="issue-suggestion"></div>
  <div class="issue-actions">
    <button class="issue-action issue-action-ignore" type="button">Always Ignore</button>
    <button class="issue-action issue-action-apply" type="button">Apply</button>
    <button class="issue-action issue-action-dismiss" type="button">Dismiss</button>
  </div>
</div>
