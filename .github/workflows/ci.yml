name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  precommit-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: node --test tests/unit/*.test.js

      - name: E2E tests
        run: node --test tests/e2e/main/*.test.js tests/e2e/renderer/*.js
