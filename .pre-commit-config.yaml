repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: npm run lint
        language: system
        pass_filenames: false
      - id: unit-tests
        name: unit tests
        entry: node --test tests/unit/*.test.js
        language: system
        pass_filenames: false
      - id: e2e-tests
        name: e2e tests
        entry: node --test tests/e2e/*.test.js
        language: system
        pass_filenames: false
